
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Blue Elephant Proposal</title>

  <style>
    body {
      margin: 0;
      background-color: #f5f3ef;
      font-family: 'Helvetica Neue', sans-serif;
      font-style: italic;
      color: #222;
      padding: 40px 20px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    .proposal-header {
      max-width: 1000px;
      margin: 0 auto 35px;
      opacity: 0;
      transform: translateY(40px);
      animation: fadeInUp 1s ease-out forwards;
    }

    .proposal-header h1 {
      font-size: 2.5rem;
      margin: 0 0 15px;
      color: #222;
    }

    .proposal-header p {
      max-width: 820px;
      font-size: 1.05rem;
      color: #555;
      margin: 0;
    }

    .pdf-viewer {
      max-width: 1100px;
      height: 85vh;
      margin: 0 auto;
      border: 2px solid #aaa;
      border-radius: 16px;
      overflow: hidden;
      background-color: #fff;
      box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.08);
      opacity: 0;
      transform: translateY(40px);
      animation: fadeInUp 1s ease-out forwards;
      animation-delay: 0.2s;
    }

    .pdf-viewer iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .button-area {
      max-width: 1100px;
      margin: 30px auto 0;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .link-button {
      display: inline-block;
      padding: 10px 20px;
      background-color: #ffffff;
      border: 2px solid #aaa;
      border-radius: 30px;
      font-size: 1rem;
      color: #333;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .link-button:hover {
      background-color: #ddd;
      border-color: #888;
      color: #000;
    }

    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(40px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 30px 16px;
      }

      .proposal-header h1 {
        font-size: 2rem;
      }

      .proposal-header p {
        font-size: 1rem;
      }

      .pdf-viewer {
        height: 70vh;
      }
    }
  </style>
</head>

<body>

  <header class="proposal-header">
    <h1>Blue Elephant Proposal</h1>
    <p>
      Full proposal archive for the Blue Elephant IMC project.
      This proposal includes brand analysis, target insight, campaign strategy,
      offline activation, digital touchpoints, and expected effects.
    </p>
  </header>

  <section class="pdf-viewer">
    <iframe
      src="https://drive.google.com/file/d/1sN4VMq0qu6Otf2-wWxuqQVw-vt1YvRD3/preview"
      title="Blue Elephant Proposal PDF"
      allow="autoplay">
    </iframe>
  </section>

  <div class="button-area">
    <a
      class="link-button"
      href="https://drive.google.com/file/d/1sN4VMq0qu6Otf2-wWxuqQVw-vt1YvRD3/view?usp=drive_link"
      target="_blank">
      Open in New Tab →
    </a>

    <a class="link-button" href="https://yejilee0307.github.io/learningbydoing/learning_by_doing.html">
      ← Back to Brand Experience
    </a>
  </div>

</body>
</html>
